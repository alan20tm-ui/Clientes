<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Bautizo | Invitación Digital</title>
  <meta name="description" content="Invitación digital elegante para bautizo con cuenta regresiva, ubicación, galería y confirmación por WhatsApp.">

  <link rel="icon" type="image/png" href="/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Parisienne&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f8f4ee;
      --ivory:#fffaf2;
      --gold:#c6a15b;
      --gold-soft:#ead2a0;
      --blue:#dcecff;
      --text:#4b4238;
      --muted:#7d7166;
      --line:rgba(198,161,91,.22);
      --shadow:rgba(80,55,25,.12);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    html{
      scroll-behavior:smooth;
      overflow-x:hidden;
    }

    body{
      font-family:'Montserrat',sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
      line-height:1.75;
    }

    a{text-decoration:none;color:inherit}
    img{width:100%;display:block}

    .ambient{
      position:fixed;
      inset:0;
      z-index:-4;
      pointer-events:none;
      background:
        radial-gradient(circle at 12% 12%,rgba(234,210,160,.28),transparent 28%),
        radial-gradient(circle at 88% 10%,rgba(220,236,255,.55),transparent 26%),
        radial-gradient(circle at 50% 95%,rgba(198,161,91,.14),transparent 35%),
        linear-gradient(180deg,#fffaf2,#f8f4ee);
    }

    .clouds{
      position:fixed;
      inset:0;
      z-index:-3;
      pointer-events:none;
      opacity:.22;
      background:
        radial-gradient(ellipse at 15% 30%,#fff 0%,transparent 28%),
        radial-gradient(ellipse at 80% 20%,#fff 0%,transparent 24%),
        radial-gradient(ellipse at 65% 78%,#fff 0%,transparent 30%);
      filter:blur(10px);
    }

    .brand-home{
      position:fixed;
      top:18px;
      left:18px;
      z-index:120;
      display:flex;
      align-items:center;
      justify-content:center;
      width:74px;
      height:74px;
      border-radius:22px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(198,161,91,.18);
      backdrop-filter:blur(16px);
      box-shadow:0 14px 36px rgba(80,55,25,.12);
      transition:.3s ease;
    }

    .brand-home:hover{
      transform:translateY(-2px) scale(1.04);
    }

    .brand-home img{
      width:58px;
      height:auto;
      object-fit:contain;
    }

    .nav{
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      z-index:100;
      display:flex;
      gap:.3rem;
      padding:.45rem;
      max-width:calc(100vw - 120px);
      overflow-x:auto;
      scrollbar-width:none;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid rgba(198,161,91,.18);
      backdrop-filter:blur(16px);
      box-shadow:0 14px 36px rgba(80,55,25,.10);
    }

    .nav::-webkit-scrollbar{display:none}

    .nav a{
      white-space:nowrap;
      padding:.58rem .9rem;
      border-radius:999px;
      font-size:.76rem;
      font-weight:600;
      color:var(--muted);
      transition:.25s ease;
    }

    .nav a:hover{
      background:rgba(198,161,91,.10);
      color:var(--text);
    }

    .floating-whatsapp{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:100;
      width:58px;
      height:58px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#25D366;
      color:#fff;
      box-shadow:0 18px 42px rgba(0,0,0,.22);
      transition:.25s ease;
    }

    .floating-whatsapp:hover{
      transform:translateY(-3px) scale(1.04);
    }

    .hero{
      position:relative;
      min-height:100vh;
      display:grid;
      place-items:center;
      text-align:center;
      padding:7rem 1.2rem 4rem;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:1rem;
      border-radius:38px;
      border:1px solid rgba(198,161,91,.22);
      pointer-events:none;
    }

    .hero-content{
      position:relative;
      z-index:3;
      max-width:940px;
      animation:fadeUp 1.15s ease both;
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      gap:.65rem;
      padding:.5rem 1rem;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--line);
      color:var(--gold);
      font-size:.76rem;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:1.4rem;
    }

    .script{
      font-family:'Parisienne',cursive;
      color:var(--gold);
      font-size:clamp(3rem,7vw,5.8rem);
      line-height:1;
      margin-bottom:.6rem;
    }

    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(4.6rem,12vw,9.4rem);
      font-weight:300;
      line-height:.86;
      color:var(--text);
      margin-bottom:1.2rem;
    }

    .hero p{
      max-width:720px;
      margin:0 auto;
      color:var(--muted);
      font-size:clamp(1rem,2.2vw,1.16rem);
    }

    .date-line{
      display:inline-flex;
      align-items:center;
      gap:1.2rem;
      margin:2rem 0 1.6rem;
      color:var(--gold);
      font-family:'Cormorant Garamond',serif;
      font-size:1.35rem;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .date-line::before,
    .date-line::after{
      content:"";
      width:58px;
      height:1px;
      background:linear
