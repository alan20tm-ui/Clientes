<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kids Party Premium | Invitación Digital</title>

  <meta name="description" content="Invitación digital premium infantil para cumpleaños, fiestas temáticas y eventos divertidos.">

  <link rel="icon" type="image/png" href="/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{

      --yellow:#ffd93d;
      --pink:#ff7eb6;
      --blue:#5ec8ff;
      --green:#5dd39e;
      --purple:#9c7bff;
      --orange:#ff9f43;

      --text:#2f2f2f;
      --muted:#6b6b6b;

      --bg:#fffdf8;

      --line:rgba(0,0,0,.05);

      --shadow:rgba(0,0,0,.08);

    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
      overflow-x:hidden;
    }

    body{

      font-family:'Fredoka',sans-serif;

      background:

        radial-gradient(circle at 10% 18%, rgba(255,217,61,.24), transparent 28%),

        radial-gradient(circle at 88% 15%, rgba(94,200,255,.22), transparent 28%),

        radial-gradient(circle at 82% 84%, rgba(93,211,158,.20), transparent 28%),

        linear-gradient(
          135deg,
          #fffef8,
          #ffffff
        );

      color:var(--text);

      line-height:1.7;

      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      max-width:100%;
      display:block;
    }

    .confetti{

      position:fixed;

      inset:0;

      z-index:-1;

      pointer-events:none;

      overflow:hidden;
    }

    .dot{

      position:absolute;

      border-radius:50%;

      opacity:.16;

      animation:float 18s linear infinite;
    }

    .dot:nth-child(1){
      width:180px;
      height:180px;
      background:var(--pink);
      left:5%;
      top:72%;
    }

    .dot:nth-child(2){
      width:120px;
      height:120px;
      background:var(--blue);
      left:82%;
      top:14%;
      animation-duration:20s;
    }

    .dot:nth-child(3){
      width:140px;
      height:140px;
      background:var(--green);
      left:76%;
      top:76%;
      animation-duration:22s;
    }

    .dot:nth-child(4){
      width:90px;
      height:90px;
      background:var(--yellow);
      left:22%;
      top:10%;
      animation-duration:16s;
    }

    .dot:nth-child(5){
      width:110px;
      height:110px;
      background:var(--orange);
      left:45%;
      top:82%;
      animation-duration:19s;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-24px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    .brand-home{

      position:fixed;

      top:18px;
      left:18px;

      z-index:120;

      width:72px;
      height:72px;

      border-radius:22px;

      display:flex;
      align-items:center;
      justify-content:center;

      background:rgba(255,255,255,.84);

      border:1px solid rgba(0,0,0,.05);

      backdrop-filter:blur(16px);

      box-shadow:0 14px 34px rgba(0,0,0,.08);

      transition:.3s ease;
    }

    .brand-home:hover{
      transform:translateY(-2px) scale(1.04);
    }

    .brand-home img{
      width:56px;
      object-fit:contain;
    }

    .floating-whatsapp{

      position:fixed;

      right:18px;
      bottom:18px;

      z-index:140;

      width:58px;
      height:58px;

      border-radius:50%;

      display:grid;
      place-items:center;

      background:#25D366;

      color:white;

      box-shadow:0 14px 34px rgba(0,0,0,.18);

      transition:.25s ease;
    }

    .floating-whatsapp:hover{
      transform:translateY(-3px) scale(1.04);
    }

    .hero{

      min-height:100vh;

      display:flex;

      align-items:center;
      justify-content:center;

      text-align:center;

      padding:7rem 1.2rem 4rem;

      position:relative;

      overflow:hidden;
    }

    .hero::before{

      content:"";

      position:absolute;

      inset:1rem;

      border:2px dashed rgba(0,0,0,.05);

      border-radius:36px;

      pointer-events:none;
    }

    .hero-content{

      max-width:920px;

      position:relative;

      z-index:2;

      animation:fadeUp 1s ease both;
    }

    .eyebrow{

      color:var(--purple);

      letter-spacing:.24em;

      text-transform:uppercase;

      font-size:.78rem;
      font-weight:700;

      margin-bottom:1.2rem;
    }

    h1{

      font-family:'Baloo 2',sans-serif;

      font-size:clamp(4rem,11vw,8rem);

      line-height:.86;

      font-weight:700;

      margin-bottom:1.2rem;

      color:#2f2f2f;
    }

    h1 span{

      background:
        linear-gradient(
          135deg,
          var(--pink),
          var(--purple),
          var(--blue)
        );

      -webkit-background-clip:text;

      color:transparent;
    }

    .hero p{

      max-width:660px;

      margin:0 auto 2rem;

      color:var(--muted);

      font-size:1.08rem;
    }

    .date{

      display:inline-flex;

      align-items:center;
      justify-content:center;

      gap:.5rem;

      padding:.85rem 1.2rem;

      border-radius:999px;

      background:rgba(255,255,255,.76);

      border:1px solid rgba(0,0,0,.05);

      font-size:.88rem;
      font-weight:700;

      margin-bottom:2rem;

      box-shadow:0 10px 24px rgba(0,0,0,.05);
    }

    .hero-actions,
    .actions{

      display:flex;

      justify-content:center;
      align-items:center;

      gap:1rem;

      flex-wrap:wrap;
    }

    .btn{

      display:inline-flex;

      align-items:center;
      justify-content:center;

      padding:1rem 1.5rem;

      border-radius:999px;

      font-size:.92rem;
      font-weight:700;

      transition:.25s ease;

      border:1px solid transparent;

      cursor:pointer;
    }

    .btn:hover{
      transform:translateY(-3px) scale(1.03);
    }

    .btn-primary{

      background:
        linear-gradient(
          135deg,
          var(--pink),
          var(--purple)
        );

      color:white;

      box-shadow:0 14px 30px rgba(0,0,0,.10);
    }

    .btn-outline{

      background:rgba(255,255,255,.80);

      border-color:rgba(0,0,0,.06);

      color:#333;
    }

    .section{
      padding:5.5rem 1.2rem;
    }

    .container{
      max-width:1080px;
      margin:auto;
    }
